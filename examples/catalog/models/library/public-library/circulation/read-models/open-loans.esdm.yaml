apiVersion: schema.esdm.io/core/v1
kind: read-model
name: open-loans
description: >
  Desk view of all open and overdue loans with patron and title summary for the
  circulation dashboard.
scope:
  domain: public-library
  boundedContext: circulation
paradigm: tabular
schema:
  type: array
  items:
    type: object
    required: [loan-id, patron-id, barcode, isbn, due-at, status]
    properties:
      loan-id:
        type: string
      patron-id:
        type: string
      patron-name:
        type: string
      barcode:
        type: string
      isbn:
        type: string
      title:
        type: string
      due-at:
        type: string
        format: date-time
      status:
        type: string
        enum: [open, overdue]
projections:
  - boundedContext: circulation
    aggregate: loan
    event: checked-out
    rule: Insert a row with loan-id, patron-id, barcode, isbn, due-at, status open.
  - boundedContext: circulation
    aggregate: loan
    event: checked-in
    rule: Remove the row for this loan-id.
  - boundedContext: circulation
    aggregate: loan
    event: loan-renewed
    rule: Update due-at and keep status open on the matching loan-id row.
  - boundedContext: circulation
    event: loan-marked-overdue
    rule: Set status to overdue when due-at is before today and loan remains open.
